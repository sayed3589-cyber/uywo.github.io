<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Members - Club Ledger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
        }
        
        .btn-back {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-back:hover {
            background: #5568d3;
        }
        
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .member-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .member-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        
        .member-name {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }
        
        .member-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .member-total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Club Members</h1>
            <button class="btn-back" onclick="location.href='index.html'">← Back</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchBox" placeholder="Search members..." onkeyup="filterMembers()">
        </div>
        
        <div class="members-grid" id="membersGrid"></div>
    </div>
    
    <script src="security.js"></script>
    <script>
        // Enforce login on page load
        enforceLogin();
        
        function getMemberTotal(memberName) {
            const contributions = getSecureData('contributions');
            return contributions
                .filter(c => c.memberName === memberName)
                .reduce((sum, c) => sum + parseFloat(c.amount || 0), 0);
        }
        
        function getUniqueMembers() {
            const contributions = getSecureData('contributions');
            const members = new Set();
            
            contributions.forEach(c => {
                if (c.memberName) {
                    members.add(c.memberName);
                }
            });
            
            return Array.from(members).sort();
        }
        
        function displayMembers(membersToShow = null) {
            const members = membersToShow || getUniqueMembers();
            const membersGrid = document.getElementById('membersGrid');
            
            if (members.length === 0) {
                membersGrid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><p>No members found. Start by recording contributions.</p></div>';
                return;
            }
            
            membersGrid.innerHTML = members.map(member => {
                const total = getMemberTotal(member);
                return `
                    <div class="member-card">
                        <div class="member-name">${sanitizeHTML(member)}</div>
                        <div class="member-info">👤 Member ID: ${member.substring(0, 3).toUpperCase()}</div>
                        <div class="member-info">💳 Contributions: ${getSecureData('contributions').filter(c => c.memberName === member).length}</div>
                        <div class="member-total">Total: ₹${total.toFixed(2)}</div>
                    </div>
                `;
            }).join('');
        }
        
        function filterMembers() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const allMembers = getUniqueMembers();
            const filtered = allMembers.filter(member => 
                member.toLowerCase().includes(searchTerm)
            );
            displayMembers(filtered);
        }
        
        displayMembers();
        logAccess(getCurrentUser(), 'VIEW_MEMBERS', 'Success');
    </script>
</body>
</html>
