<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Club Ledger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
        }
        
        .btn-back {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-back:hover {
            background: #5568d3;
        }
        
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .form-group.full {
            grid-template-columns: 1fr;
        }
        
        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        .btn-add {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
        
        .btn-add:hover {
            background: #5568d3;
        }
        
        .members-list {
            margin-top: 30px;
        }
        
        .member-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .member-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .member-info p {
            color: #666;
            font-size: 14px;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Members</h1>
            <button class="btn-back" onclick="location.href='index.html'">← Back</button>
        </div>
        
        <div>
            <h3 style="margin-bottom: 15px;">Add New Member</h3>
            <div class="form-group">
                <input type="text" id="memberName" placeholder="Member Name" />
                <input type="email" id="memberEmail" placeholder="Email" />
            </div>
            <div class="form-group full">
                <input type="text" id="memberPhone" placeholder="Phone Number" />
            </div>
            <button class="btn-add" onclick="addMember()">Add Member</button>
        </div>
        
        <div class="members-list">
            <h3 style="margin-bottom: 15px;">Members List</h3>
            <div id="membersList"></div>
        </div>
    </div>
    
    <script>
        function addMember() {
            const name = document.getElementById('memberName').value.trim();
            const email = document.getElementById('memberEmail').value.trim();
            const phone = document.getElementById('memberPhone').value.trim();
            
            if (!name) {
                alert('Please enter member name');
                return;
            }
            
            const members = JSON.parse(localStorage.getItem('members')) || [];
            members.push({
                id: Date.now(),
                name: name,
                email: email,
                phone: phone,
                joinDate: new Date().toLocaleDateString()
            });
            
            localStorage.setItem('members', JSON.stringify(members));
            document.getElementById('memberName').value = '';
            document.getElementById('memberEmail').value = '';
            document.getElementById('memberPhone').value = '';
            
            loadMembers();
        }
        
        function deleteMember(id) {
            if (confirm('Are you sure you want to delete this member?')) {
                let members = JSON.parse(localStorage.getItem('members')) || [];
                members = members.filter(m => m.id !== id);
                localStorage.setItem('members', JSON.stringify(members));
                loadMembers();
            }
        }
        
        function loadMembers() {
            const members = JSON.parse(localStorage.getItem('members')) || [];
            const membersList = document.getElementById('membersList');
            
            if (members.length === 0) {
                membersList.innerHTML = '<div class="empty-state"><p>No members added yet. Add a member to get started!</p></div>';
                return;
            }
            
            membersList.innerHTML = members.map(member => `
                <div class="member-card">
                    <div class="member-info">
                        <h3>${member.name}</h3>
                        <p>📧 ${member.email || 'N/A'} | 📱 ${member.phone || 'N/A'}</p>
                        <p style="font-size: 12px; margin-top: 5px;">Joined: ${member.joinDate}</p>
                    </div>
                    <button class="btn-delete" onclick="deleteMember(${member.id})">Delete</button>
                </div>
            `).join('');
        }
        
        loadMembers();
    </script>
</body>
</html>
