<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Ledger Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .balance-card h2 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .balance-card .amount {
            font-size: 32px;
            font-weight: 700;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        button {
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #764ba2;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #653a8a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Club Ledger</h1>
        <p class="subtitle">Manage contributions and expenses for charity and social work</p>
        
        <div class="balance-card">
            <h2>Current Balance</h2>
            <div class="amount" id="balance">₹0</div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="location.href='members.html'">👥 View Members</button>
            <button class="btn-primary" onclick="location.href='contribution.html'">➕ Record Contribution</button>
            <button class="btn-secondary" onclick="location.href='expense.html'">➖ Log Expense</button>
            <button class="btn-secondary" onclick="location.href='reports.html'">📊 View Reports</button>
        </div>
    </div>
    
    <script>
        // Load and display balance
        function updateBalance() {
            const contributions = JSON.parse(localStorage.getItem('contributions')) || [];
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            
            const totalContributions = contributions.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
            const totalExpenses = expenses.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
            const balance = totalContributions - totalExpenses;
            
            document.getElementById('balance').textContent = '₹' + balance.toFixed(2);
        }
        
        updateBalance();
    </script>
</body>
</html>
