<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Club Ledger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
        }
        
        .btn-back {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-back:hover {
            background: #5568d3;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .section {
            margin-top: 40px;
        }
        
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        th {
            background: #f8f9fa;
            color: #333;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #ddd;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .amount-positive {
            color: #27ae60;
            font-weight: 600;
        }
        
        .amount-negative {
            color: #e74c3c;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
        
        .btn-export {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .btn-export:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Reports</h1>
            <button class="btn-back" onclick="location.href='index.html'">← Back</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Contributions</h3>
                <div class="value" id="totalContributions">₹0</div>
            </div>
            <div class="stat-card">
                <h3>Total Expenses</h3>
                <div class="value" id="totalExpenses">₹0</div>
            </div>
            <div class="stat-card">
                <h3>Current Balance</h3>
                <div class="value" id="balance">₹0</div>
            </div>
            <div class="stat-card">
                <h3>Total Members</h3>
                <div class="value" id="totalMembers">0</div>
            </div>
        </div>
        
        <button class="btn-export" onclick="exportReport()">📥 Export Report (CSV)</button>
        
        <div class="section">
            <h2>💰 Top Contributors</h2>
            <div id="topContributors"></div>
        </div>
        
        <div class="section">
            <h2>📂 Expense Breakdown</h2>
            <div id="expenseBreakdown"></div>
        </div>
        
        <div class="section">
            <h2>📋 Contribution Summary</h2>
            <div id="contributionSummary"></div>
        </div>
    </div>
    
    <script>
        function loadReports() {
            const contributions = JSON.parse(localStorage.getItem('contributions')) || [];
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            const members = JSON.parse(localStorage.getItem('members')) || [];
            
            // Calculate totals
            const totalContributions = contributions.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
            const totalExpenses = expenses.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
            const balance = totalContributions - totalExpenses;
            
            document.getElementById('totalContributions').textContent = '₹' + totalContributions.toFixed(2);
            document.getElementById('totalExpenses').textContent = '₹' + totalExpenses.toFixed(2);
            document.getElementById('balance').textContent = '₹' + balance.toFixed(2);
            document.getElementById('totalMembers').textContent = members.length;
            
            // Top Contributors
            const contributorMap = {};
            contributions.forEach(item => {
                contributorMap[item.memberName] = (contributorMap[item.memberName] || 0) + parseFloat(item.amount);
            });
            
            const topContributors = Object.entries(contributorMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);
            
            const topContributorsDiv = document.getElementById('topContributors');
            if (topContributors.length === 0) {
                topContributorsDiv.innerHTML = '<div class="empty-state"><p>No contributions yet</p></div>';
            } else {
                topContributorsDiv.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Member Name</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${topContributors.map(([name, amount]) => `
                                <tr>
                                    <td>${name}</td>
                                    <td class="amount-positive">₹${amount.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
            
            // Expense Breakdown
            const categoryMap = {};
            expenses.forEach(item => {
                categoryMap[item.category] = (categoryMap[item.category] || 0) + parseFloat(item.amount);
            });
            
            const expenseBreakdown = Object.entries(categoryMap)
                .sort((a, b) => b[1] - a[1]);
            
            const expenseBreakdownDiv = document.getElementById('expenseBreakdown');
            if (expenseBreakdown.length === 0) {
                expenseBreakdownDiv.innerHTML = '<div class="empty-state"><p>No expenses logged yet</p></div>';
            } else {
                expenseBreakdownDiv.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Percentage</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${expenseBreakdown.map(([category, amount]) => `
                                <tr>
                                    <td>${category}</td>
                                    <td class="amount-negative">₹${amount.toFixed(2)}</td>
                                    <td>${totalExpenses > 0 ? ((amount / totalExpenses) * 100).toFixed(1) : 0}%</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
            
            // Contribution Summary
            const contributionSummaryDiv = document.getElementById('contributionSummary');
            if (contributions.length === 0) {
                contributionSummaryDiv.innerHTML = '<div class="empty-state"><p>No contributions yet</p></div>';
            } else {
                const sorted = [...contributions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
                contributionSummaryDiv.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Member</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sorted.map(item => `
                                <tr>
                                    <td>${item.memberName}</td>
                                    <td>${new Date(item.date).toLocaleDateString()}</td>
                                    <td class="amount-positive">₹${item.amount.toFixed(2)}</td>
                                    <td>${item.description || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }
        }
        
        function exportReport() {
            const contributions = JSON.parse(localStorage.getItem('contributions')) || [];
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            
            let csv = 'CLUB LEDGER REPORT\n';
            csv += 'Generated: ' + new Date().toLocaleString() + '\n\n';
            
            csv += 'CONTRIBUTIONS\n';
            csv += 'Member Name,Amount,Date,Description\n';
            contributions.forEach(item => {
                csv += `"${item.memberName}",${item.amount},"${item.date}","${item.description || ''}"\n`;
            });
            
            csv += '\nEXPENSES\n';
            csv += 'Category,Amount,Date,Paid By,Description\n';
            expenses.forEach(item => {
                csv += `"${item.category}",${item.amount},"${item.date}","${item.paidBy}","${item.description || ''}"\n`;
            });
            
            const totalContributions = contributions.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
            const totalExpenses = expenses.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
            
            csv += '\nSUMMARY\n';
            csv += `Total Contributions,${totalContributions.toFixed(2)}\n`;
            csv += `Total Expenses,${totalExpenses.toFixed(2)}\n`;
            csv += `Balance,${(totalContributions - totalExpenses).toFixed(2)}\n`;
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'club-ledger-report-' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
        }
        
        loadReports();
    </script>
</body>
</html>
