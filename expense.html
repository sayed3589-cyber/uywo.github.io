<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Expense - Club Ledger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
        }
        
        .btn-back {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-back:hover {
            background: #5568d3;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn-submit {
            background: #764ba2;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
        }
        
        .btn-submit:hover {
            background: #653a8a;
        }
        
        .expenses-list {
            margin-top: 40px;
        }
        
        .expense-card {
            background: #f8f9fa;
            border-left: 4px solid #764ba2;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .expense-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .expense-info p {
            color: #666;
            font-size: 14px;
        }
        
        .amount {
            font-size: 18px;
            font-weight: 700;
            color: #764ba2;
        }
        
        .btn-delete {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-delete:hover {
            background: #c0392b;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>➖ Log Expense</h1>
            <button class="btn-back" onclick="location.href='index.html'">← Back</button>
        </div>
        
        <div>
            <h3 style="margin-bottom: 20px;">Add New Expense</h3>
            
            <div class="form-group">
                <label>Expense Category *</label>
                <select id="category">
                    <option value="">Select Category</option>
                    <option value="Food & Beverages">Food & Beverages</option>
                    <option value="Charity">Charity</option>
                    <option value="Event Management">Event Management</option>
                    <option value="Supplies">Supplies</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Amount (₹) *</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" />
            </div>
            
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" />
            </div>
            
            <div class="form-group">
                <label>Paid By</label>
                <input type="text" id="paidBy" placeholder="Person's name" />
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Add details about this expense..."></textarea>
            </div>
            
            <button class="btn-submit" onclick="addExpense()">Log Expense</button>
        </div>
        
        <div class="expenses-list">
            <h3 style="margin-bottom: 15px;">Recent Expenses</h3>
            <div id="expensesList"></div>
        </div>
    </div>
    
    <script>
        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();
        
        function addExpense() {
            const category = document.getElementById('category').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const paidBy = document.getElementById('paidBy').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!category) {
                alert('Please select a category');
                return;
            }
            
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }
            
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            expenses.push({
                id: Date.now(),
                category: category,
                amount: amount,
                date: date || new Date().toISOString().split('T')[0],
                paidBy: paidBy || 'Unknown',
                description: description,
                recordedDate: new Date().toLocaleString()
            });
            
            localStorage.setItem('expenses', JSON.stringify(expenses));
            document.getElementById('category').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('paidBy').value = '';
            document.getElementById('description').value = '';
            document.getElementById('date').valueAsDate = new Date();
            
            loadExpenses();
            alert('Expense recorded successfully!');
        }
        
        function deleteExpense(id) {
            if (confirm('Are you sure you want to delete this expense?')) {
                let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
                expenses = expenses.filter(e => e.id !== id);
                localStorage.setItem('expenses', JSON.stringify(expenses));
                loadExpenses();
            }
        }
        
        function loadExpenses() {
            const expenses = JSON.parse(localStorage.getItem('expenses')) || [];
            const expensesList = document.getElementById('expensesList');
            
            if (expenses.length === 0) {
                expensesList.innerHTML = '<div class="empty-state"><p>No expenses logged yet.</p></div>';
                return;
            }
            
            // Sort by date descending
            const sorted = [...expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            expensesList.innerHTML = sorted.map(expense => `
                <div class="expense-card">
                    <div class="expense-info">
                        <h3>${expense.category}</h3>
                        <p>📅 ${new Date(expense.date).toLocaleDateString()} | 💳 ${expense.paidBy}</p>
                        ${expense.description ? `<p>${expense.description}</p>` : ''}
                    </div>
                    <div style="text-align: right;">
                        <div class="amount">₹${expense.amount.toFixed(2)}</div>
                        <button class="btn-delete" onclick="deleteExpense(${expense.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        loadExpenses();
    </script>
</body>
</html>
